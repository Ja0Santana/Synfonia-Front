name: Frontend CI (Node/Vite)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: .

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build
      env:
        # Variáveis dummy para build passar sem erros de env faltando
        VITE_API_URL: http://localhost:8080/api/v1
        VITE_SPOTIFY_CLIENT_ID: 12345
        VITE_SPOTIFY_REDIRECT_URI: http://localhost:5173/callback
